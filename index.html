<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Game</title>
    <link rel ="stylesheet" href="main.css";>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="app.js" type="text/javascript"></script>
</head>
<body>
    <div class="content">
        <div class="menus">
            <div class="main">
                <button id="chop">Chop Log</button>
                <button id="visit">Visit marketplace</button>
                <button id="mineStone">Mine Stone</button>
            </div>
            <div class="marketplace">
                <div class="sellButtons">
                    <button id="sell-log">Sell 1 log</button>
                    <button id="sell-10-logs">Sell 10 logs</button>
                    <button id="sell-100-logs">Sell 100 logs</button>
                    <button id="sell-all-logs">Sell all logs</button>
                    <button id="sell-stone">Sell 1 stone</button>
                    <button id="sell-10-stone">Sell 10 stones</button>
                    <button id="sell 100-stone">Sell 100 stones</button>
                    <button id="sell-all-stone">Sell All stones</button>
                    <button id="sell-hide">Sell 1 Hide</button>
                    <button id="sell-10-hide">Sell 10 hide</button>
                    <button id="sell-100-hide">Sell 100 hide</button>
                    <button id="sell-all-hide">Sell All hides</button>
                </div>
                <div id="main-upgrades" class ="upgrades">
                    <button id="axe-upgrade">Upgrade axe</button>
                    <button id="pickaxe">Buy pickaxe</button>                    
                    <button id="rod">Buy Fishing Rod</button> 
                    <buttom id="rifle">Buy rifle</buttom>
                    <button id="auto-chopper">Hire a lumberjack</button>
                    <button id="auto-miner">Hire a miner</button>
                    <button id="auto-hunter">Hire a hunter</button>

                </div>
                <div id="unique-upgrades" class="upgrades">
                    <button id="axe-sharpener">Buy Axe Sharpener</button>
                    <button id="horse"></button>
                    <button id="wagon">Buy a Wagon [Horse Required]</button>
                    <button id="train">Buy a Train </button>
                    <button id="hunting-hound">Buy a hunting Hound</button>
                </div>
                <button id="return">Return</button>
            </div>
        </div>
    </div>
    <div class="inventory"></div>
        <p id="money">Money: $0</p>
        <p id="logs">logs: 0</p>
        <p id="pickaxes"></p>
        <p id="stone"></p>
    </div>
</body>
